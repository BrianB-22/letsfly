<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LetsFly — MSFS Flight Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #0a0d10;
    --bg1: #0e1318;
    --bg2: #131920;
    --bg3: #1a2230;
    --panel: #111720;
    --border: #1e2d3d;
    --border2: #243447;
    --accent: #00b4d8;
    --accent2: #0077a8;
    --accent-glow: rgba(0,180,216,0.15);
    --amber: #f4a261;
    --amber-glow: rgba(244,162,97,0.15);
    --green: #52b788;
    --red: #e76f51;
    --text: #c8d8e8;
    --text2: #7a92a8;
    --text3: #4a6070;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
    --cond: 'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg0);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,180,216,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,216,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-mark {
    font-family: var(--cond);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .status-bar {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1px;
  }

  .status-bar span { color: var(--green); }

  /* Auth buttons - HOOK FOR SUPABASE */
  /* TODO: Replace these with Supabase auth UI */
  .auth-btn {
    font-family: var(--cond);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .auth-btn-ghost {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
  }

  .auth-btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .auth-btn-solid {
    background: var(--accent);
    border: 1px solid var(--accent);
    color: #000;
  }

  .auth-btn-solid:hover {
    background: #00c8f0;
  }

  /* ── MAIN LAYOUT ── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* ── FILTER GRID ── */
  .filter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  @media (max-width: 900px) {
    .filter-grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }

  .panel-badge {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    padding: 2px 8px;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .badge-dep {
    background: rgba(244,162,97,0.15);
    color: var(--amber);
    border: 1px solid rgba(244,162,97,0.3);
  }

  .badge-arr {
    background: rgba(0,180,216,0.12);
    color: var(--accent);
    border: 1px solid rgba(0,180,216,0.3);
  }

  .panel-title {
    font-family: var(--cond);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
  }

  .panel-body { padding: 16px; }

  /* ── RADIO GROUP ── */
  .radio-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }

  .radio-opt {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .radio-opt input[type="radio"] {
    appearance: none;
    width: 14px; height: 14px;
    border: 1px solid var(--border2);
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s;
  }

  .radio-opt input[type="radio"]:checked {
    border-color: var(--amber);
    background: var(--amber);
    box-shadow: 0 0 6px rgba(244,162,97,0.4);
  }

  .dep-panel .radio-opt input[type="radio"]:checked {
    border-color: var(--amber);
    background: var(--amber);
    box-shadow: 0 0 6px rgba(244,162,97,0.4);
  }

  .arr-panel .radio-opt input[type="radio"]:checked {
    border-color: var(--accent);
    background: var(--accent);
    box-shadow: 0 0 6px rgba(0,180,216,0.4);
  }

  .radio-opt label {
    font-family: var(--cond);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text2);
    cursor: pointer;
  }

  .radio-opt input[type="radio"]:checked + label { color: var(--text); }

  /* ── COLLAPSIBLE SECTION ── */
  .section {
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .section-inner {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── FORM ELEMENTS ── */
  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .field-row label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text3);
    text-transform: uppercase;
    white-space: nowrap;
    min-width: 70px;
  }

  .field-row.col {
    flex-direction: column;
    align-items: stretch;
  }

  .field-row.col label { min-width: unset; margin-bottom: 4px; }

  input[type="text"],
  input[type="number"],
  select {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 3px;
    width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
    appearance: none;
  }

  input[type="text"]:focus,
  input[type="number"]:focus,
  select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  input[type="text"]::placeholder { color: var(--text3); }

  select option { background: var(--bg2); color: var(--text); }

  .select-wrap { position: relative; }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    pointer-events: none;
    font-size: 11px;
  }

  .inline-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* ── CHECKBOX GRID ── */
  .check-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
  }

  .check-opt {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 3px;
    transition: background 0.1s;
  }

  .check-opt:hover { background: var(--bg3); }

  .check-opt input[type="checkbox"] {
    appearance: none;
    width: 13px; height: 13px;
    border: 1px solid var(--border2);
    border-radius: 2px;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.15s;
  }

  .dep-panel .check-opt input[type="checkbox"]:checked {
    background: var(--amber);
    border-color: var(--amber);
  }

  .arr-panel .check-opt input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-opt label {
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    line-height: 1.2;
  }

  /* ── RANGE FIELDS ── */
  .range-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .range-row label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .range-row input[type="number"] { width: 80px; }

  .range-sep {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }

  /* ── VALIDATE BUTTON ── */
  .btn-validate {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 5px 12px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .btn-validate:hover {
    border-color: var(--amber);
    color: var(--amber);
  }

  /* ── FLIGHT CONTROLS ── */
  .flight-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .speed-field {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 14px;
  }

  .speed-field label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text3);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .speed-field input {
    width: 65px;
    text-align: center;
  }

  .speed-field .unit {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  /* ── LETS FLY BUTTON ── */
  .btn-fly {
    flex: 1;
    min-width: 200px;
    padding: 14px 32px;
    font-family: var(--cond);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #00b4d8, #0077a8);
    border: none;
    color: #000;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-fly::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-fly:hover::before { opacity: 1; }

  .btn-fly:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(0,180,216,0.35);
  }

  .btn-fly:active { transform: translateY(0); }

  .btn-fly:disabled {
    background: var(--bg3);
    color: var(--text3);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* ── RESULTS SECTION ── */
  .results-area { display: none; }
  .results-area.visible { display: block; }

  .results-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 0;
  }

  .tab-btn {
    font-family: var(--cond);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    background: var(--bg1);
    border: 1px solid var(--border);
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
    border-bottom: none;
  }

  .tab-btn:first-child { border-radius: 4px 0 0 0; }
  .tab-btn:last-child { border-radius: 0 4px 0 0; }

  .tab-btn.active {
    background: var(--panel);
    color: var(--accent);
    border-color: var(--border);
    border-bottom: 1px solid var(--panel);
    position: relative;
    z-index: 1;
  }

  .results-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0 4px 4px 4px;
    display: none;
  }

  .results-panel.active { display: block; }

  /* ── TEXT RESULTS ── */
  .text-results {
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 700px) {
    .text-results { grid-template-columns: 1fr; }
  }

  .airport-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .airport-card-header {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .dep-card .airport-card-header {
    background: rgba(244,162,97,0.08);
    border-bottom: 1px solid rgba(244,162,97,0.2);
  }

  .arr-card .airport-card-header {
    background: rgba(0,180,216,0.08);
    border-bottom: 1px solid rgba(0,180,216,0.2);
  }

  .card-role {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .dep-card .card-role { color: var(--amber); }
  .arr-card .card-role { color: var(--accent); }

  .card-ident {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 3px;
  }

  .card-airnav {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }

  .card-airnav:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .card-body { padding: 14px; }

  .card-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 10px;
  }

  .card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text3);
    text-transform: uppercase;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 2px;
    text-transform: uppercase;
    border: 1px solid;
  }

  .tag-green { color: var(--green); border-color: rgba(82,183,136,0.3); background: rgba(82,183,136,0.08); }
  .tag-amber { color: var(--amber); border-color: rgba(244,162,97,0.3); background: rgba(244,162,97,0.08); }
  .tag-blue  { color: var(--accent); border-color: rgba(0,180,216,0.3); background: rgba(0,180,216,0.08); }
  .tag-gray  { color: var(--text3); border-color: var(--border); background: var(--bg2); }

  /* Flight summary strip */
  .flight-summary {
    grid-column: 1 / -1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-wrap: wrap;
    gap: 16px;
  }

  .summary-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .summary-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
  }

  .summary-value {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--accent);
  }

  .summary-unit {
    font-size: 11px;
    color: var(--text3);
  }

  .flight-arrow {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text3);
  }

  /* Action row */
  .result-actions {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .action-btn {
    font-family: var(--cond);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 18px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid;
  }

  .action-btn-ghost {
    background: transparent;
    border-color: var(--border2);
    color: var(--text2);
  }

  .action-btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* TODO: Hook Save button to Supabase */
  .action-btn-save {
    background: rgba(82,183,136,0.1);
    border-color: rgba(82,183,136,0.3);
    color: var(--green);
  }

  .action-btn-save:hover {
    background: rgba(82,183,136,0.2);
  }

  /* TODO: Hook Share button to Supabase shareable link */
  .action-btn-share {
    background: rgba(0,180,216,0.1);
    border-color: rgba(0,180,216,0.3);
    color: var(--accent);
  }

  .action-btn-share:hover {
    background: rgba(0,180,216,0.2);
  }

  /* ── MAP RESULTS ── */
  #map-container {
    height: 460px;
    background: #0d1520;
    position: relative;
  }

  #map { width: 100%; height: 100%; }

  .map-overlay {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(10,13,16,0.85);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 10px 14px;
    backdrop-filter: blur(4px);
    pointer-events: none;
  }

  .map-route-label {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  /* ── STATUS MSG ── */
  #status-msg {
    padding: 12px 20px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text3);
    border-top: 1px solid var(--border);
    display: none;
  }

  #status-msg.visible { display: block; }
  #status-msg.err { color: var(--red); }
  #status-msg.ok { color: var(--green); }

  /* Loading state */
  .btn-fly.loading {
    background: var(--bg3);
    color: var(--text3);
    cursor: wait;
  }

  /* Section divider labels */
  .sec-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    padding: 6px 0 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  /* Pilot notes */
  .pilot-notes {
    grid-column: 1 / -1;
    padding: 10px 14px;
  }

  .pilot-notes textarea {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--sans);
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 3px;
    resize: vertical;
    min-height: 70px;
  }

  .pilot-notes textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .pilot-notes label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  /* Pulsing dot for LIVE */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .pulse-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
    margin-right: 4px;
  }

  /* Matching count badge */
  .match-count {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--bg2);
    color: var(--text3);
    margin-left: auto;
  }

  /* Disabled state for sections */
  .section-inner.disabled {
    opacity: 0.35;
    pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">✈ LetsFly</div>
    <div class="logo-sub">MSFS2020 Flight Finder v2.0</div>
  </div>
  <div class="header-right">
    <div class="status-bar">
      <span class="pulse-dot"></span>
      DB: <span id="db-count">Loading...</span> airports
    </div>
    <!-- SUPABASE AUTH HOOK: Replace these buttons with Supabase auth UI component -->
    <!-- import { Auth } from '@supabase/auth-ui-react' when migrating to React -->
    <button class="auth-btn auth-btn-ghost" onclick="alert('TODO: Connect to Supabase Auth for login')">Sign In</button>
    <button class="auth-btn auth-btn-solid" onclick="alert('TODO: Connect to Supabase Auth for signup')">Create Account</button>
  </div>
</header>

<div class="app">

  <!-- ── FILTER PANELS ── -->
  <div class="filter-grid">

    <!-- DEPARTURE PANEL -->
    <div class="panel dep-panel">
      <div class="panel-header">
        <div class="panel-badge badge-dep">DEP</div>
        <div class="panel-title">Departure Airport</div>
        <div class="match-count" id="dep-match">—</div>
      </div>
      <div class="panel-body">

        <div class="radio-group">
          <label class="radio-opt">
            <input type="radio" name="dep-mode" value="specific" id="dep-specific" onchange="depModeChanged()">
            <label for="dep-specific">Enter Specific Airport</label>
          </label>
          <label class="radio-opt">
            <input type="radio" name="dep-mode" value="random" id="dep-random" checked onchange="depModeChanged()">
            <label for="dep-random">Random — Match Criteria Below</label>
          </label>
        </div>

        <!-- Specific Airport Input -->
        <div class="section" id="dep-specific-section" style="display:none">
          <div class="section-inner">
            <div class="field-row">
              <label>ICAO</label>
              <input type="text" id="dep-ident" placeholder="e.g. KCLT" maxlength="6" oninput="this.value=this.value.toUpperCase()">
              <button class="btn-validate" onclick="validateDep()">Validate</button>
            </div>
            <div id="dep-validate-msg" style="font-family:var(--mono);font-size:10px;color:var(--text3);padding:2px 0;"></div>
          </div>
        </div>

        <!-- Random Criteria -->
        <div id="dep-random-section">
          <div class="section">
            <div class="section-inner">
              <div class="sec-label">Location</div>
              <div class="field-row col">
                <label>Continent</label>
                <div class="select-wrap">
                  <select id="dep-continent" onchange="updateDepCountry()">
                    <option value="">— Any —</option>
                    <option>Africa</option><option>Antarctica</option><option>Asia</option>
                    <option>Europe</option><option selected>North America</option>
                    <option>Oceania</option><option>South America</option>
                  </select>
                </div>
              </div>
              <div class="inline-fields">
                <div class="field-row col">
                  <label>Country</label>
                  <div class="select-wrap">
                    <select id="dep-country" onchange="updateDepRegion()">
                      <option value="">— Random —</option>
                    </select>
                  </div>
                </div>
                <div class="field-row col">
                  <label>Region/State</label>
                  <div class="select-wrap">
                    <select id="dep-region">
                      <option value="">— Random —</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-inner">
              <div class="sec-label">Airport Type</div>
              <div class="check-grid">
                <label class="check-opt"><input type="checkbox" class="dep-type" value="Small Airport" checked><label>Small Airport</label></label>
                <label class="check-opt"><input type="checkbox" class="dep-type" value="Medium Airport" checked><label>Medium Airport</label></label>
                <label class="check-opt"><input type="checkbox" class="dep-type" value="Large Airport" checked><label>Large Airport</label></label>
                <label class="check-opt"><input type="checkbox" class="dep-type" value="Seaplane Base"><label>Seaplane Base</label></label>
                <label class="check-opt"><input type="checkbox" class="dep-type" value="Heliport"><label>Heliport</label></label>
                <label class="check-opt"><input type="checkbox" class="dep-type" value="Closed Airport"><label>Closed Airport</label></label>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-inner">
              <div class="sec-label">Runway Surface</div>
              <div class="check-grid">
                <label class="check-opt"><input type="checkbox" class="dep-rwy" value="hard" checked><label>Hard / Concrete</label></label>
                <label class="check-opt"><input type="checkbox" class="dep-rwy" value="soft"><label>Soft / Grass</label></label>
                <label class="check-opt"><input type="checkbox" class="dep-rwy" value="water"><label>Water Landings</label></label>
                <label class="check-opt"><input type="checkbox" class="dep-rwy" value="heli"><label>Helipad</label></label>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-inner">
              <div class="sec-label">Runway Length (ft)</div>
              <div class="range-row">
                <label>Min</label>
                <input type="number" id="dep-rwy-min" placeholder="None" min="0" max="20000" style="width:90px">
                <label>Max</label>
                <input type="number" id="dep-rwy-max" placeholder="None" min="0" max="20000" style="width:90px">
              </div>
              <div class="sec-label" style="margin-top:8px">Fuel</div>
              <div class="check-grid">
                <label class="check-opt"><input type="checkbox" id="dep-avgas"><label>AV GAS</label></label>
                <label class="check-opt"><input type="checkbox" id="dep-jeta"><label>JET A</label></label>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- ARRIVAL PANEL -->
    <div class="panel arr-panel">
      <div class="panel-header">
        <div class="panel-badge badge-arr">ARR</div>
        <div class="panel-title">Arrival Airport</div>
        <div class="match-count" id="arr-match">—</div>
      </div>
      <div class="panel-body">

        <div class="field-row" style="margin-bottom:14px">
          <label style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;white-space:nowrap">Range (nm)</label>
          <input type="number" id="arr-min" value="100" min="1" style="width:80px;text-align:center">
          <span class="range-sep">—</span>
          <input type="number" id="arr-max" value="1000" min="1" style="width:80px;text-align:center">
        </div>

        <div class="section">
          <div class="section-inner">
            <div class="sec-label">Location</div>
            <div class="field-row col">
              <label>Continent</label>
              <div class="select-wrap">
                <select id="arr-continent" onchange="updateArrCountry()">
                  <option value="">— Any —</option>
                  <option>Africa</option><option>Antarctica</option><option>Asia</option>
                  <option>Europe</option><option selected>North America</option>
                  <option>Oceania</option><option>South America</option>
                </select>
              </div>
            </div>
            <div class="inline-fields">
              <div class="field-row col">
                <label>Country</label>
                <div class="select-wrap">
                  <select id="arr-country" onchange="updateArrRegion()">
                    <option value="">— Random —</option>
                  </select>
                </div>
              </div>
              <div class="field-row col">
                <label>Region/State</label>
                <div class="select-wrap">
                  <select id="arr-region">
                    <option value="">— Random —</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-inner">
            <div class="sec-label">Airport Type</div>
            <div class="check-grid">
              <label class="check-opt"><input type="checkbox" class="arr-type" value="Small Airport" checked><label>Small Airport</label></label>
              <label class="check-opt"><input type="checkbox" class="arr-type" value="Medium Airport" checked><label>Medium Airport</label></label>
              <label class="check-opt"><input type="checkbox" class="arr-type" value="Large Airport" checked><label>Large Airport</label></label>
              <label class="check-opt"><input type="checkbox" class="arr-type" value="Seaplane Base"><label>Seaplane Base</label></label>
              <label class="check-opt"><input type="checkbox" class="arr-type" value="Heliport"><label>Heliport</label></label>
              <label class="check-opt"><input type="checkbox" class="arr-type" value="Closed Airport"><label>Closed Airport</label></label>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-inner">
            <div class="sec-label">Runway Surface</div>
            <div class="check-grid">
              <label class="check-opt"><input type="checkbox" class="arr-rwy" value="hard" checked><label>Hard / Concrete</label></label>
              <label class="check-opt"><input type="checkbox" class="arr-rwy" value="soft"><label>Soft / Grass</label></label>
              <label class="check-opt"><input type="checkbox" class="arr-rwy" value="water"><label>Water Landings</label></label>
              <label class="check-opt"><input type="checkbox" class="arr-rwy" value="heli"><label>Helipad</label></label>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-inner">
            <div class="sec-label">Approach Systems</div>
            <div class="check-grid">
              <label class="check-opt"><input type="checkbox" id="arr-als"><label>ALS Lighting</label></label>
              <label class="check-opt"><input type="checkbox" id="arr-vasi"><label>VASI</label></label>
              <label class="check-opt"><input type="checkbox" id="arr-ils"><label>ILS</label></label>
            </div>
            <div class="sec-label" style="margin-top:8px">Runway Length (ft)</div>
            <div class="range-row">
              <label>Min</label>
              <input type="number" id="arr-rwy-min" placeholder="None" min="0" max="20000" style="width:90px">
              <label>Max</label>
              <input type="number" id="arr-rwy-max" placeholder="None" min="0" max="20000" style="width:90px">
            </div>
            <div class="sec-label" style="margin-top:8px">Fuel</div>
            <div class="check-grid">
              <label class="check-opt"><input type="checkbox" id="arr-avgas"><label>AV GAS</label></label>
              <label class="check-opt"><input type="checkbox" id="arr-jeta"><label>JET A</label></label>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── FLIGHT CONTROLS ── -->
  <div class="flight-controls">
    <div class="speed-field">
      <label>Cruise Speed</label>
      <input type="number" id="cruise-speed" value="280" min="50" max="700" style="width:65px;text-align:center">
      <div class="unit">kts</div>
    </div>
    <button class="btn-fly" id="btn-fly" onclick="findFlight()">✈ LET'S FLY!</button>
    <button class="action-btn action-btn-ghost" id="btn-next-hop" onclick="nextHop()" style="display:none">Next Hop →</button>
  </div>

  <!-- ── STATUS ── -->
  <div id="status-msg"></div>

  <!-- ── RESULTS ── -->
  <div class="results-area" id="results-area">
    <div class="results-tabs">
      <button class="tab-btn active" onclick="switchTab('text')">Flight Details</button>
      <button class="tab-btn" onclick="switchTab('map')">Map View</button>
    </div>

    <div class="results-panel active" id="tab-text">
      <div class="text-results" id="text-results">
        <!-- Filled by JS -->
      </div>
      <div class="result-actions">
        <button class="action-btn action-btn-ghost" onclick="copyFlight()">Copy to Clipboard</button>
        <!-- TODO: Wire to Supabase - saves flight to user's saved_flights table -->
        <button class="action-btn action-btn-save" onclick="alert('TODO: Implement Supabase save flight for logged-in user')">Save Flight</button>
        <!-- TODO: Wire to Supabase - generates shareable link via saved_flights with public=true -->
        <button class="action-btn action-btn-share" onclick="alert('TODO: Implement Supabase shareable link generation')">Share Flight</button>
        <button class="action-btn action-btn-ghost" onclick="openWeather()">Arrival Weather</button>
      </div>
    </div>

    <div class="results-panel" id="tab-map">
      <div id="map-container">
        <div id="map"></div>
        <div class="map-overlay" id="map-overlay" style="display:none">
          <div class="map-route-label" id="map-route-label"></div>
        </div>
      </div>
      <div class="result-actions">
        <button class="action-btn action-btn-ghost" onclick="switchTab('text')">← Back to Details</button>
      </div>
    </div>
  </div>

</div>

async function loadAirports() {
  try {
    // Airports data embedded inline as base64 / lazy loaded
    // For the web version, airports.json sits beside this HTML file
    const resp = await fetch('airports.json');
    if (!resp.ok) throw new Error('fetch failed');
    AIRPORTS = await resp.json();
    document.getElementById('db-count').textContent = AIRPORTS.length.toLocaleString();
    initDropdowns();
  } catch(e) {
    // Fallback: show graceful message
    document.getElementById('db-count').textContent = 'offline';
    setStatus('Airport database not found. Place airports.json in the same folder as this file.', 'err');
  }
}

function populateSelect(sel, items, defaultLabel='— Random —') {
  const cur = sel.value;
  sel.innerHTML = `<option value="">${defaultLabel}</option>`;
  items.forEach(i => {
    const o = document.createElement('option');
    o.value = i; o.textContent = i;
    if (i === cur) o.selected = true;
    sel.appendChild(o);
  });
}

function initDropdowns() {
  updateDepCountry();
  updateArrCountry();
}

function updateDepCountry() {
  const cont = document.getElementById('dep-continent').value;
  const sel = document.getElementById('dep-country');
  if (cont && LOOKUP[cont]) {

  }
}

// ═══════════════════════════════════════════════════════
// FLIGHT MATH
// ═══════════════════════════════════════════════════════
function distNm(lat1, lon1, lat2, lon2) {
  if (lat1===lat2 && lon1===lon2) return 0;
  const toR = d => d * Math.PI / 180;
  const t = lon1 - lon2;
  let d = Math.sin(toR(lat1))*Math.sin(toR(lat2)) + Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.cos(toR(t));
  d = Math.acos(Math.min(1, Math.max(-1, d)));
  return (d * 180 / Math.PI) * 60 * 1.1515 * 0.8684;
}

function bearing(lat1, lon1, lat2, lon2) {
  const toR = d => d * Math.PI / 180;
  const dLon = toR(lon2 - lon1);
  const dPhi = Math.log(Math.tan(toR(lat2)/2 + Math.PI/4) / Math.tan(toR(lat1)/2 + Math.PI/4));
  let b = Math.atan2(dLon, dPhi);
  b = (b * 180 / Math.PI + 360) % 360;
  return b;
}

function bearingName(b) {
  const names = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return names[Math.round(b / 22.5) % 16];
}

// ═══════════════════════════════════════════════════════
// FILTER AIRPORTS
// ═══════════════════════════════════════════════════════
function getCheckedValues(cls) {
  return [...document.querySelectorAll(`.${cls}:checked`)].map(el => el.value);
}

function filterAirports(prefix) {
  let pool = AIRPORTS;

  // Location filters
  const cont = document.getElementById(`${prefix}-continent`).value;
  const country = document.getElementById(`${prefix}-country`).value;
  const region = document.getElementById(`${prefix}-region`).value;
  if (cont) pool = pool.filter(a => a.continent === cont);
  if (country) pool = pool.filter(a => a.country === country);
  if (region) pool = pool.filter(a => a.region === region);

  // Airport type
  const types = getCheckedValues(`${prefix}-type`);
  if (types.length) pool = pool.filter(a => types.includes(a.type));

  // Runway surface
  const rwys = getCheckedValues(`${prefix}-rwy`);
  if (rwys.length) {
    pool = pool.filter(a => {
      return rwys.some(r => {
        if (r === 'hard') return a.hard === 1;
        if (r === 'soft') return a.soft === 1;
        if (r === 'water') return a.water === 1;
        if (r === 'heli') return a.heli === 1;
        return false;
      });
    });
  }

  // Runway length
  const minRwy = parseInt(document.getElementById(`${prefix}-rwy-min`).value) || 0;
  const maxRwy = parseInt(document.getElementById(`${prefix}-rwy-max`).value) || 999999;
  if (minRwy > 0) pool = pool.filter(a => a.runway >= minRwy);
  if (maxRwy < 999999) pool = pool.filter(a => a.runway <= maxRwy);

  // Fuel
  if (document.getElementById(`${prefix}-avgas`).checked) pool = pool.filter(a => a.avgas === 1);
  if (document.getElementById(`${prefix}-jeta`).checked) pool = pool.filter(a => a.jeta === 1);

  // Approaches (arrival only)
  if (prefix === 'arr') {
    if (document.getElementById('arr-als').checked) pool = pool.filter(a => a.als === 1);
    if (document.getElementById('arr-vasi').checked) pool = pool.filter(a => a.vasi === 1);
    if (document.getElementById('arr-ils').checked) pool = pool.filter(a => a.ils === 1);
  }

  return pool;
}

// ═══════════════════════════════════════════════════════
// MAIN FLIGHT FINDER
// ═══════════════════════════════════════════════════════
function findFlight() {
  if (!AIRPORTS.length) {
    setStatus('Airport database not loaded.', 'err');
    return;
  }

  const btn = document.getElementById('btn-fly');
  btn.disabled = true;
  btn.textContent = '⟳ Searching...';

  setTimeout(() => {
    try {
      _doFind();
    } catch(e) {
      setStatus('Error: ' + e.message, 'err');
    }
    btn.disabled = false;
    btn.textContent = '✈ LET\'S FLY!';
  }, 80);
}

function _doFind() {
  // Get departure
  let dep = null;
  const depMode = document.querySelector('input[name="dep-mode"]:checked').value;

  if (depMode === 'specific') {
    const ident = document.getElementById('dep-ident').value.toUpperCase().trim();
    dep = AIRPORTS.find(a => a.id === ident);
    if (!dep) { setStatus('Departure airport not found: ' + ident, 'err'); return; }
  } else {
    const pool = filterAirports('dep');
    document.getElementById('dep-match').textContent = pool.length.toLocaleString() + ' match';
    if (!pool.length) { setStatus('No departure airports match your criteria. Try relaxing the filters.', 'err'); return; }
    dep = pool[Math.floor(Math.random() * pool.length)];
  }

  // Get arrival candidates
  const arrPool = filterAirports('arr');
  document.getElementById('arr-match').textContent = arrPool.length.toLocaleString() + ' match';

  if (!arrPool.length) { setStatus('No arrival airports match your criteria. Try relaxing the filters.', 'err'); return; }

  const minNm = parseFloat(document.getElementById('arr-min').value) || 0;
  const maxNm = parseFloat(document.getElementById('arr-max').value) || 99999;

  // Filter by distance, exclude same airport
  const candidates = arrPool.filter(a => {
    if (a.id === dep.id) return false;
    const d = distNm(dep.lat, dep.lon, a.lat, a.lon);
    return d >= minNm && d <= maxNm;
  });

  if (!candidates.length) {
    setStatus(`No arrival airports within ${minNm}–${maxNm}nm of ${dep.id}. Try adjusting the range.`, 'err');
    return;
  }

  const arr = candidates[Math.floor(Math.random() * candidates.length)];
  currentDep = dep;
  currentArr = arr;

  renderResults(dep, arr);
  setStatus('Not interested? Click LET\'S FLY! again for a different random flight!', 'ok');
  document.getElementById('btn-next-hop').style.display = 'inline-flex';
}

// ═══════════════════════════════════════════════════════
// RENDER RESULTS
// ═══════════════════════════════════════════════════════
function renderResults(dep, arr) {
  const dist = distNm(dep.lat, dep.lon, arr.lat, arr.lon);
  const bear = bearing(dep.lat, dep.lon, arr.lat, arr.lon);
  const speed = parseFloat(document.getElementById('cruise-speed').value) || 280;
  const time = dist / speed;
  const bName = bearingName(bear);

  function makeTags(airport, isDep) {
    let tags = '';
    if (airport.hard===1) tags += '<span class="tag tag-gray">Hard</span>';
    if (airport.soft===1) tags += '<span class="tag tag-gray">Soft</span>';
    if (airport.water===1) tags += '<span class="tag tag-blue">Water</span>';
    if (airport.heli===1) tags += '<span class="tag tag-gray">Heli</span>';
    if (airport.avgas===1) tags += '<span class="tag tag-amber">AVGAS</span>';
    if (airport.jeta===1) tags += '<span class="tag tag-amber">JET A</span>';
    if (!isDep) {
      if (airport.ils===1) tags += '<span class="tag tag-green">ILS</span>';
      if (airport.vasi===1) tags += '<span class="tag tag-green">VASI</span>';
      if (airport.als===1) tags += '<span class="tag tag-green">ALS</span>';
    }
    return tags;
  }

  const html = `
    <div class="airport-card dep-card">
      <div class="airport-card-header">
        <div>
          <div class="card-role">Departure</div>
          <div class="card-ident">${dep.id}</div>
        </div>
        <a class="card-airnav" href="https://ourairports.com/airports/${dep.id}" target="_blank">Airport Info ↗</a>
      </div>
      <div class="card-body">
        <div class="card-name">${dep.name}</div>
        <div class="card-stats">
          <div class="stat-item"><div class="stat-label">Type</div><div class="stat-value">${dep.type}</div></div>
          <div class="stat-item"><div class="stat-label">Elevation</div><div class="stat-value">${dep.elev} ft</div></div>
          <div class="stat-item"><div class="stat-label">Max Runway</div><div class="stat-value">${dep.runway > 0 ? dep.runway.toLocaleString() + ' ft' : '—'}</div></div>
          <div class="stat-item"><div class="stat-label">Location</div><div class="stat-value">${dep.city || '—'}, ${dep.country}</div></div>
        </div>
        <div class="tags" style="margin-top:10px">${makeTags(dep, true)}</div>
      </div>
    </div>

    <div class="airport-card arr-card">
      <div class="airport-card-header">
        <div>
          <div class="card-role">Arrival</div>
          <div class="card-ident">${arr.id}</div>
        </div>
        <a class="card-airnav" href="https://ourairports.com/airports/${arr.id}" target="_blank">Airport Info ↗</a>
      </div>
      <div class="card-body">
        <div class="card-name">${arr.name}</div>
        <div class="card-stats">
          <div class="stat-item"><div class="stat-label">Type</div><div class="stat-value">${arr.type}</div></div>
          <div class="stat-item"><div class="stat-label">Elevation</div><div class="stat-value">${arr.elev} ft</div></div>
          <div class="stat-item"><div class="stat-label">Max Runway</div><div class="stat-value">${arr.runway > 0 ? arr.runway.toLocaleString() + ' ft' : '—'}</div></div>
          <div class="stat-item"><div class="stat-label">Location</div><div class="stat-value">${arr.city || '—'}, ${arr.country}</div></div>
        </div>
        <div class="tags" style="margin-top:10px">${makeTags(arr, false)}</div>
      </div>
    </div>

    <div class="flight-summary">
      <div class="summary-stat">
        <div class="summary-label">Distance</div>
        <div class="summary-value">${dist.toFixed(0)}<span class="summary-unit"> nm</span></div>
      </div>
      <div class="flight-arrow">${dep.id} ——— ${bName} ——→ ${arr.id}</div>
      <div class="summary-stat">
        <div class="summary-label">Bearing</div>
        <div class="summary-value">${bear.toFixed(1)}<span class="summary-unit">°</span></div>
      </div>
      <div class="summary-stat">
        <div class="summary-label">Est. Time</div>
        <div class="summary-value">${time.toFixed(1)}<span class="summary-unit"> hr</span></div>
      </div>
      <div class="summary-stat">
        <div class="summary-label">@ Cruise</div>
        <div class="summary-value">${speed}<span class="summary-unit"> kts</span></div>
      </div>
    </div>

    <div class="pilot-notes" style="grid-column:1/-1">
      <label>Pilot Notes</label>
      <textarea placeholder="Add your flight notes here..."></textarea>
    </div>
  `;

  document.getElementById('text-results').innerHTML = html;
  document.getElementById('results-area').classList.add('visible');
  document.getElementById('results-area').scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Update map if visible
  if (document.getElementById('tab-map').classList.contains('active')) {
    renderMap(dep, arr);
  }
}

// ═══════════════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════════════
function renderMap(dep, arr) {
  if (!mapInstance) {
    mapInstance = L.map('map', { zoomControl: true, attributionControl: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19
    }).addTo(mapInstance);
  }

  if (mapLayer) { mapLayer.remove(); mapLayer = null; }

  const g = L.layerGroup().addTo(mapInstance);
  mapLayer = g;

  const depIcon = L.divIcon({
    html: `<div style="font-family:'Share Tech Mono',monospace;font-size:11px;background:#f4a261;color:#000;padding:3px 7px;border-radius:3px;white-space:nowrap;font-weight:600">✈ ${dep.id}</div>`,
    className: '', iconAnchor: [0, 0]
  });

  const arrIcon = L.divIcon({
    html: `<div style="font-family:'Share Tech Mono',monospace;font-size:11px;background:#00b4d8;color:#000;padding:3px 7px;border-radius:3px;white-space:nowrap;font-weight:600">⬛ ${arr.id}</div>`,
    className: '', iconAnchor: [0, 0]
  });

  L.marker([dep.lat, dep.lon], { icon: depIcon }).addTo(g);
  L.marker([arr.lat, arr.lon], { icon: arrIcon }).addTo(g);

  // Great circle line approximation
  L.polyline([[dep.lat, dep.lon], [arr.lat, arr.lon]], {
    color: '#00b4d8', weight: 2, opacity: 0.8, dashArray: '8 6'
  }).addTo(g);

  const bounds = L.latLngBounds([[dep.lat, dep.lon], [arr.lat, arr.lon]]);
  mapInstance.fitBounds(bounds, { padding: [60, 60] });

  document.getElementById('map-overlay').style.display = 'block';
  document.getElementById('map-route-label').textContent = `${dep.id} → ${arr.id}`;
}

// ═══════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.results-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn:${tab==='text'?'first':'last'}-child`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'map' && currentDep && currentArr) {
    setTimeout(() => renderMap(currentDep, currentArr), 50);
  }
}

// ═══════════════════════════════════════════════════════
// NEXT HOP
// ═══════════════════════════════════════════════════════
function nextHop() {
  if (!currentArr) return;
  // Set departure mode to specific, fill with last arrival
  document.getElementById('dep-specific').checked = true;
  document.getElementById('dep-ident').value = currentArr.id;
  depModeChanged();
  // Validate
  const msg = document.getElementById('dep-validate-msg');
  msg.style.color = 'var(--green)';
  msg.textContent = `✓ ${currentArr.name} — ${currentArr.type} — ${currentArr.city}, ${currentArr.country}`;
  findFlight();
}

// ═══════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════
function setStatus(msg, type='') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'visible' + (type ? ' ' + type : '');
}

function copyFlight() {
  if (!currentDep || !currentArr) return;
  const dist = distNm(currentDep.lat, currentDep.lon, currentArr.lat, currentArr.lon);
  const bear = bearing(currentDep.lat, currentDep.lon, currentArr.lat, currentArr.lon);
  const speed = parseFloat(document.getElementById('cruise-speed').value) || 280;
  const txt = `LetsFly Flight Plan
DEPARTURE: ${currentDep.id} — ${currentDep.name}
ARRIVAL:   ${currentArr.id} — ${currentArr.name}
Distance:  ${dist.toFixed(0)} nm
Bearing:   ${bear.toFixed(1)}° (${bearingName(bear)})
Est. Time: ${(dist/speed).toFixed(1)} hours @ ${speed} kts
[FOR ENTERTAINMENT PURPOSES ONLY]`;
  navigator.clipboard.writeText(txt).then(() => setStatus('Copied to clipboard!', 'ok'));
}

function openWeather() {
  if (!currentArr) return;
  window.open(`https://forecast.weather.gov/MapClick.php?lat=${currentArr.lat}&lon=${currentArr.lon}`, '_blank');
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
loadAirports();
depModeChanged();

// Mutual exclusivity for fuel checkboxes
document.getElementById('dep-avgas').addEventListener('change', function() { if(this.checked) document.getElementById('dep-jeta').checked = false; });
document.getElementById('dep-jeta').addEventListener('change', function() { if(this.checked) document.getElementById('dep-avgas').checked = false; });
document.getElementById('arr-avgas').addEventListener('change', function() { if(this.checked) document.getElementById('arr-jeta').checked = false; });
document.getElementById('arr-jeta').addEventListener('change', function() { if(this.checked) document.getElementById('arr-avgas').checked = false; });
</script>
